<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전자 서명 패드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
        }

        .card-header {
            margin-bottom: 24px;
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .card-header p {
            font-size: 13px;
            color: #8a8fa8;
        }

        /* 입력 필드 */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0e3ed;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a2e;
            background: #fafbfc;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field input:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
            background: #fff;
        }

        .field input.error {
            border-color: #e63946;
            box-shadow: 0 0 0 3px rgba(230,57,70,0.08);
        }

        .field .error-msg {
            display: none;
            font-size: 12px;
            color: #e63946;
            margin-top: 4px;
        }

        .field.has-error .error-msg { display: block; }
        .field.has-error input { border-color: #e63946; }

        /* 서명 영역 */
        .signature-section {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .signature-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 8px;
        }

        .signature-label .clear-btn {
            font-size: 12px;
            color: #8a8fa8;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
        }

        .signature-label .clear-btn:hover {
            background: #f0f2f5;
            color: #4361ee;
        }

        .canvas-wrapper {
            position: relative;
            border: 1.5px solid #e0e3ed;
            border-radius: 10px;
            overflow: hidden;
            background: #fafbfc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .canvas-wrapper.focused {
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
        }

        .canvas-wrapper.error {
            border-color: #e63946;
            box-shadow: 0 0 0 3px rgba(230,57,70,0.08);
        }

        canvas {
            display: block;
            width: 100%;
            height: 180px;
            touch-action: none;
            cursor: crosshair;
        }

        /* 서명 안내 오버레이 */
        .signature-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .signature-placeholder .icon {
            font-size: 28px;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .signature-placeholder span {
            font-size: 13px;
            color: #aaa;
        }

        .signature-placeholder.hidden { opacity: 0; }

        .sig-error-msg {
            display: none;
            font-size: 12px;
            color: #e63946;
            margin-top: 5px;
        }

        .sig-error-msg.show { display: block; }

        /* 구분선 */
        .divider {
            border: none;
            border-top: 1px solid #f0f2f5;
            margin: 8px 0 20px;
        }

        /* 제출 버튼 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover:not(:disabled) {
            background: #3451d1;
            box-shadow: 0 4px 14px rgba(67,97,238,0.35);
        }

        .submit-btn:active:not(:disabled) { transform: scale(0.98); }

        .submit-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        /* 로딩 스피너 */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 토스트 알림 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: white;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 9999;
        }

        .toast.success { background: #2d6a4f; }
        .toast.error   { background: #e63946; }
        .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* HTTPS 경고 */
        .https-warning {
            display: none;
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>전자 서명 제출</h2>
            <p>아래 항목을 입력하고 서명을 완료해주세요.</p>
        </div>

        <!-- HTTPS 경고 -->
        <div class="https-warning" id="httpsWarning">
            ⚠️ 현재 HTTP 환경에서 실행 중입니다. 보안을 위해 HTTPS 환경을 권장합니다.
        </div>

        <!-- 이름 -->
        <div class="field" id="fieldName">
            <label for="userName">이름 <span style="color:#e63946">*</span></label>
            <input type="text" id="userName" placeholder="구글 폼과 동일하게 입력" autocomplete="name">
            <div class="error-msg">이름을 입력해주세요.</div>
        </div>

        <!-- 전화번호 -->
        <div class="field" id="fieldPhone">
            <label for="userPhone">휴대폰 번호 <span style="color:#e63946">*</span></label>
            <input type="tel" id="userPhone" placeholder="010-0000-0000" autocomplete="tel"
                   maxlength="13">
            <div class="error-msg">올바른 휴대폰 번호를 입력해주세요. (예: 010-1234-5678)</div>
        </div>

        <hr class="divider">

        <!-- 서명 -->
        <div class="signature-section">
            <div class="signature-label">
                <span>서명 <span style="color:#e63946">*</span></span>
                <button class="clear-btn" type="button" onclick="clearSignature()">✕ 지우기</button>
            </div>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="signature-pad"></canvas>
                <div class="signature-placeholder" id="sigPlaceholder">
                    <div class="icon">✍️</div>
                    <span>이곳에 서명해주세요</span>
                </div>
            </div>
            <div class="sig-error-msg" id="sigErrorMsg">서명을 입력해주세요.</div>
        </div>

        <!-- 제출 버튼 -->
        <button class="submit-btn" id="submitBtn" type="button" onclick="submitSignature()">
            <span class="btn-text">제출하기</span>
            <div class="spinner"></div>
        </button>
    </div>

    <!-- 토스트 -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        // ——————————————————————————————————————————
        // [중요] 배포된 Google Apps Script 웹 앱 URL로 변경하세요
        // ——————————————————————————————————————————
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwKJB_gSIaC_eM8S1Aqz9JPFk-CdkTEAeO6YFmPBTEZltWtV-Z7qTcS4eum1soJ-qKmAQ/exec";

        // ── HTTPS 확인 ──────────────────────────────
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            document.getElementById('httpsWarning').style.display = 'block';
        }

        // ── 서명 패드 초기화 ─────────────────────────
        const canvas = document.getElementById('signature-pad');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const sigPlaceholder = document.getElementById('sigPlaceholder');

        const signaturePad = new SignaturePad(canvas, {
            minWidth: 1,
            maxWidth: 3,
            penColor: '#1a1a2e'
        });

        // 서명 시작 시 안내 텍스트 숨김 & 포커스 효과
        signaturePad.addEventListener('beginStroke', () => {
            sigPlaceholder.classList.add('hidden');
            canvasWrapper.classList.add('focused');
            canvasWrapper.classList.remove('error');
            document.getElementById('sigErrorMsg').classList.remove('show');
        });

        signaturePad.addEventListener('endStroke', () => {
            canvasWrapper.classList.remove('focused');
        });

        // ── 캔버스 리사이즈 (서명 데이터 보존) ──────────
        function resizeCanvas() {
            const data = signaturePad.toData(); // 서명 데이터 백업
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width  = (canvas.offsetWidth  || 360) * ratio;
            canvas.height = (canvas.offsetHeight || 180) * ratio;
            canvas.getContext('2d').scale(ratio, ratio);
            signaturePad.clear();
            if (data && data.length > 0) {
                signaturePad.fromData(data); // 서명 복원
            }
            // 안내 텍스트 표시 여부 갱신
            sigPlaceholder.classList.toggle('hidden', !signaturePad.isEmpty());
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
        resizeCanvas();

        // ── 지우기 ───────────────────────────────────
        function clearSignature() {
            signaturePad.clear();
            sigPlaceholder.classList.remove('hidden');
            canvasWrapper.classList.remove('error');
            document.getElementById('sigErrorMsg').classList.remove('show');
        }

        // ── 전화번호 자동 포맷 (010-xxxx-xxxx) ─────────
        const phoneInput = document.getElementById('userPhone');
        phoneInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 11) val = val.slice(0, 11);
            if (val.length >= 8) {
                val = val.replace(/(\d{3})(\d{4})(\d{0,4})/, '$1-$2-$3');
            } else if (val.length >= 4) {
                val = val.replace(/(\d{3})(\d{0,4})/, '$1-$2');
            }
            e.target.value = val;
        });

        // ── 유효성 검사 ──────────────────────────────
        function validateName() {
            const val = document.getElementById('userName').value.trim();
            const field = document.getElementById('fieldName');
            if (!val) { field.classList.add('has-error'); return false; }
            field.classList.remove('has-error');
            return true;
        }

        function validatePhone() {
            const val = phoneInput.value.trim();
            const field = document.getElementById('fieldPhone');
            const phoneRegex = /^01[016789]-\d{3,4}-\d{4}$/;
            if (!phoneRegex.test(val)) { field.classList.add('has-error'); return false; }
            field.classList.remove('has-error');
            return true;
        }

        function validateSignature() {
            if (signaturePad.isEmpty()) {
                canvasWrapper.classList.add('error');
                document.getElementById('sigErrorMsg').classList.add('show');
                return false;
            }
            canvasWrapper.classList.remove('error');
            document.getElementById('sigErrorMsg').classList.remove('show');
            return true;
        }

        // 실시간 유효성 해제
        document.getElementById('userName').addEventListener('input', () => {
            document.getElementById('fieldName').classList.remove('has-error');
        });
        phoneInput.addEventListener('input', () => {
            document.getElementById('fieldPhone').classList.remove('has-error');
        });

        // ── 토스트 알림 ──────────────────────────────
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        // ── 제출 ─────────────────────────────────────
        async function submitSignature() {
            // 유효성 검사 (모두 실행해서 에러 표시)
            const ok = [validateName(), validatePhone(), validateSignature()].every(Boolean);
            if (!ok) return;

            const btn = document.getElementById('submitBtn');

            // 중복 제출 방지
            if (btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('loading');

            const payload = {
                name:      document.getElementById('userName').value.trim(),
                phone:     phoneInput.value.trim(),
                image:     signaturePad.toDataURL('image/png'),
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                // HTTP 상태 코드 검증
                if (!response.ok) {
                    throw new Error(`서버 오류 (${response.status})`);
                }

                showToast('✅ 성공적으로 제출되었습니다!', 'success');

                // 제출 후 초기화
                document.getElementById('userName').value = '';
                phoneInput.value = '';
                clearSignature();

            } catch (err) {
                console.error('제출 오류:', err);
                showToast('❌ 제출에 실패했습니다. 다시 시도해주세요.', 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
