<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전자 서명 패드</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; background-color: #f4f4f9; }
        .box { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        canvas { border: 1px solid #ccc; background: white; width: 100%; height: 200px; border-radius: 8px; touch-action: none; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: white; }
        button.clear { background: #6c757d; }
    </style>
</head>
<body>
    <div class="box">
        <h3>서명 제출</h3>
        <input type="text" id="userName" placeholder="이름 (구글 폼과 동일하게)" required>
        <input type="tel" id="userPhone" placeholder="휴대폰 번호 (구글 폼과 동일하게)" required>
        <canvas id="signature-pad"></canvas>
        <div class="button-group">
            <button class="clear" onclick="clearSignature()">지우기</button>
            <button onclick="submitSignature()">제출하기</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);
        function clearSignature() { signaturePad.clear(); }

        async function submitSignature() {
            if (signaturePad.isEmpty()) return alert("서명을 입력해주세요.");
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            if (!name || !phone) return alert("이름과 휴대폰 번호를 모두 입력해주세요.");
            
            const dataURL = signaturePad.toDataURL("image/png");
            
            // 데이터 구성
            const payload = JSON.stringify({ name: name, phone: phone, image: dataURL });
            const formData = new URLSearchParams();
            formData.append("data", payload);

            // [중요] 아래 URL을 배포된 최신 웹 앱 URL로 변경하세요!
            const GAS_URL = "https://script.google.com/macros/s/AKfycbwKJB_gSIaC_eM8S1Aqz9JPFk-CdkTEAeO6YFmPBTEZltWtV-Z7qTcS4eum1soJ-qKmAQ/exec"; 

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: formData
                });
                alert("성공적으로 제출되었습니다!");
            } catch (err) {
                alert("제출 실패: " + err);
            }
        }
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
