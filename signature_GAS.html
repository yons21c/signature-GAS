<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전자 서명 패드 (구글 폼 연동형)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; max-width: 400px; background-color: #f4f4f9; }
        .box { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        canvas { border: 1px solid #ccc; background: white; width: 100%; height: 200px; border-radius: 8px; touch-action: none; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: white; }
        button.clear { background: #6c757d; }
    </style>
</head>
<body>

    <div class="box">
        <h3>서명 제출</h3>
        <input type="text" id="userName" placeholder="이름 (구글 폼과 동일하게)" required>
        <input type="tel" id="userPhone" placeholder="휴대폰 번호 (구글 폼과 동일하게)" required>
        <canvas id="signature-pad"></canvas>
        <div class="button-group">
            <button class="clear" onclick="clearSignature()">지우기</button>
            <button onclick="submitSignature()">제출하기</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        function clearSignature() { signaturePad.clear(); }

        async function submitSignature() {
            if (signaturePad.isEmpty()) return alert("서명을 먼저 입력해주세요.");
            const userName = document.getElementById('userName').value;
            const userPhone = document.getElementById('userPhone').value;
            if (!userName || !userPhone) return alert("이름과 휴대폰 번호를 모두 입력해주세요.");
            
            const dataURL = signaturePad.toDataURL("image/png");
            
            // 폼 제출 방식 (CORS 문제 회피)
            const form = document.createElement('form');
            form.method = 'POST';
            // !!! 배포하신 GAS 주소를 입력하세요 !!!
            form.action = 'YOUR_GAS_WEB_APP_URL';
            
            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'hidden';
            hiddenInput.name = 'data';
            hiddenInput.value = JSON.stringify({ name: userName, phone: userPhone, image: dataURL });
            
            form.appendChild(hiddenInput);
            document.body.appendChild(form);
            form.submit();
        }
        
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
